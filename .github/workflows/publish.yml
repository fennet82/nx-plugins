name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version bump type
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - prerelease
      first_release:
        description: Is this the very first release? (no prior git tag exists yet)
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install

      - name: Configure git identity for the release commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # CI (ci.yml) already lints/tests/builds every affected project on every
      # push/PR to master, and the "preVersionCommand" in nx.json's release
      # config builds everything again right before versioning — so there's
      # no separate lint/test/build step here.
      # Git commit/tag/push behavior comes from nx.json's release.git config,
      # not flags here — the top-level `nx release` command doesn't accept
      # --git-commit/--git-tag/--git-push (those are version/changelog
      # subcommand-only flags).
      - name: Version, changelog, GitHub release, and publish to npm
        run: >
          pnpm nx release ${{ inputs.version }}
          --yes
          ${{ inputs.first_release && '--first-release' || '' }}
        env:
          # GitHub release creation (release.changelog.projectChangelogs.createRelease
          # in nx.json) — the default Actions token, scoped by the contents:write
          # permission above, no extra secret needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # npm publish auth + provenance
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
